name: Engine Tournament Regression

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      games_per_tc:
        description: "Game pairs per time control (even number)"
        required: false
        default: "20"
      sprt_mode:
        description: "Use SPRT early stopping (true) or fixed game count (false)"
        required: false
        default: "true"
      sprt_elo0:
        description: "SPRT H0 bound (null hypothesis: regression >= this)"
        required: false
        default: "-10"
      sprt_elo1:
        description: "SPRT H1 bound (alternative: gain >= this)"
        required: false
        default: "5"
      threads_per_engine:
        description: "Threads allocated to each engine"
        required: false
        default: "1"
      hash_mb:
        description: "Hash table size per engine (MB)"
        required: false
        default: "128"
      test_ab_only:
        description: "Also run AB-only (no GPU) tournament"
        required: false
        default: "true"
      concurrency:
        description: "Concurrent games (1 = fairest, 2 = faster on 4+ cores)"
        required: false
        default: "1"

concurrency:
  group: metalfish-tournament-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  METALFISH_NETWORK_CACHE_DIR: ~/.cache/metalfish/networks

jobs:
  # ===========================================================================
  # Job 1: Build both engines in a single job (avoids artifact upload overhead
  # and ensures both share the same runner/toolchain for fair comparison).
  # ===========================================================================
  tournament:
    name: Engine-vs-Engine Tournament
    runs-on: macos-latest
    timeout-minutes: 150

    permissions:
      contents: read

    steps:
      # -----------------------------------------------------------------------
      # Setup
      # -----------------------------------------------------------------------
      - name: Checkout PR candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: candidate

      - name: Checkout main baseline
        uses: actions/checkout@v6
        with:
          ref: main
          path: baseline

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sw_vers
          echo "CPU cores: $(sysctl -n hw.ncpu)"
          echo "Memory: $(( $(sysctl -n hw.memsize) / 1024 / 1024 )) MB"
          system_profiler SPDisplaysDataType | grep -A 4 "Metal" || true
          brew install protobuf zlib abseil zstd
          python3 -m pip install --upgrade pip
          python3 -m pip install python-chess numpy

      - name: Cache engine networks
        uses: actions/cache@v5
        with:
          path: ~/.cache/metalfish/networks
          key: ${{ runner.os }}-engine-networks-bt4-nnue-v2
          restore-keys: |
            ${{ runner.os }}-engine-networks-

      - name: Download engine networks
        working-directory: candidate
        run: |
          python3 tools/download_engine_networks.py
          mkdir -p ../baseline/networks
          rsync -a networks/ ../baseline/networks/

      # -----------------------------------------------------------------------
      # Build cutechess-cli from source (vendored in reference/)
      # -----------------------------------------------------------------------
      - name: Build cutechess-cli
        run: |
          if [ -d candidate/reference/cutechess ]; then
            cd candidate/reference/cutechess
            if [ ! -f build/cutechess-cli ]; then
              mkdir -p build && cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release -DWITH_CUTE_GUI=OFF 2>/dev/null || \
                cmake .. -DCMAKE_BUILD_TYPE=Release
              make -j"$(sysctl -n hw.ncpu)" cutechess-cli 2>/dev/null || \
                make -j"$(sysctl -n hw.ncpu)"
            fi
          fi

      # -----------------------------------------------------------------------
      # Build baseline engine
      # -----------------------------------------------------------------------
      - name: Patch baseline for Apple Clang compatibility
        run: |
          if ! grep -q 'target("dotprod")' baseline/src/eval/nnue/simd.h 2>/dev/null; then
            cp candidate/src/eval/nnue/simd.h baseline/src/eval/nnue/simd.h
          fi

      - name: Configure baseline
        run: |
          cmake -S baseline -B baseline/build \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DUSE_METAL=ON \
            -DBUILD_TESTS=OFF

      - name: Build baseline
        run: cmake --build baseline/build --target metalfish -j"$(sysctl -n hw.ncpu)"

      # -----------------------------------------------------------------------
      # Build candidate engine
      # -----------------------------------------------------------------------
      - name: Configure candidate
        run: |
          cmake -S candidate -B candidate/build \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DUSE_METAL=ON \
            -DBUILD_TESTS=OFF

      - name: Build candidate
        run: cmake --build candidate/build --target metalfish -j"$(sysctl -n hw.ncpu)"

      # -----------------------------------------------------------------------
      # Verify both engines respond to UCI
      # -----------------------------------------------------------------------
      - name: Smoke-test both engines
        run: |
          for engine in baseline/build/metalfish candidate/build/metalfish; do
            echo "uci" | ./$engine > /tmp/uci_out.txt 2>/dev/null &
            PID=$!
            sleep 5
            kill $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
            if grep -q "uciok" /tmp/uci_out.txt; then
              echo "OK: $engine responds to UCI"
            else
              echo "FATAL: $engine did not respond to UCI"
              cat /tmp/uci_out.txt
              exit 1
            fi
          done
          echo "Both engines respond to UCI protocol."

      # -----------------------------------------------------------------------
      # Tournament: Hybrid mode (GPU + CPU) -- the primary strength test
      # -----------------------------------------------------------------------
      - name: Tournament - Hybrid mode (blitz 10+0.1)
        id: hybrid_blitz
        env:
          GAMES: ${{ github.event.inputs.games_per_tc || '50' }}
          SPRT_MODE: ${{ github.event.inputs.sprt_mode || 'true' }}
          ELO0: ${{ github.event.inputs.sprt_elo0 || '-10' }}
          ELO1: ${{ github.event.inputs.sprt_elo1 || '5' }}
          THREADS: ${{ github.event.inputs.threads_per_engine || '1' }}
          HASH: ${{ github.event.inputs.hash_mb || '128' }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '1' }}
        run: |
          CUTECHESS="$(pwd)/candidate/reference/cutechess/build/cutechess-cli"
          BASELINE="$(pwd)/baseline/build/metalfish"
          CANDIDATE="$(pwd)/candidate/build/metalfish"
          WEIGHTS="$(pwd)/candidate/networks/BT4-1024x15x32h-swa-6147500.pb"
          BOOK="$(pwd)/candidate/reference/books/8moves_v3.pgn"
          mkdir -p results/hybrid_blitz

          SPRT_ARGS=""
          if [ "$SPRT_MODE" = "true" ]; then
            SPRT_ARGS="-sprt elo0=${ELO0} elo1=${ELO1} alpha=0.05 beta=0.05"
          fi

          BOOK_ARGS=""
          if [ -f "$BOOK" ]; then
            BOOK_ARGS="-openings file=$BOOK format=pgn order=random plies=16"
          fi

          set +e
          "$CUTECHESS" \
            -engine cmd="$CANDIDATE" name=Candidate proto=uci dir="$(pwd)/candidate" \
              "option.Threads=${THREADS}" "option.Hash=${HASH}" \
              option.UseHybridSearch=true option.UseMCTS=false \
              "option.NNWeights=${WEIGHTS}" \
              option.MCTSAddDirichletNoise=false \
              option.MCTSParityPreset=false \
              option.TransformerLowTimeFallbackMs=1500 \
              option.TransformerMinMoveBudgetMs=400 \
              option.HybridABRootRejectMCTS=true \
              option.HybridMCTSRootReject=true \
              option.HybridMCTSABRootHints=true \
              option.HybridMCTSABRootHintCount=8 \
              option.HybridMCTSABRootHintDelayMs=0 \
              option.HybridABCandidateVerifyMs=240 \
              option.HybridABCandidateVerifyCount=5 \
              option.HybridRootPawnLeverTieBreak=true \
              option.HybridMCTSUseSharedTT=false \
              option.HybridMCTSSharedTTCpScale=230 \
              option.MCTSMinimumKLDGainPerNode=0.00003 \
              option.MCTSPolicySoftmaxTemp=1.359 \
              "option.Move Overhead=200" \
            -engine cmd="$BASELINE" name=Baseline proto=uci dir="$(pwd)/baseline" \
              "option.Threads=${THREADS}" "option.Hash=${HASH}" \
              option.UseHybridSearch=true option.UseMCTS=false \
              "option.NNWeights=${WEIGHTS}" \
              option.MCTSAddDirichletNoise=false \
              option.MCTSParityPreset=false \
              option.TransformerLowTimeFallbackMs=1500 \
              option.TransformerMinMoveBudgetMs=400 \
              option.HybridABRootRejectMCTS=true \
              option.HybridMCTSRootReject=true \
              option.HybridMCTSABRootHints=true \
              option.HybridMCTSABRootHintCount=8 \
              option.HybridMCTSABRootHintDelayMs=0 \
              option.HybridABCandidateVerifyMs=240 \
              option.HybridABCandidateVerifyCount=5 \
              option.HybridRootPawnLeverTieBreak=true \
              option.HybridMCTSUseSharedTT=false \
              option.HybridMCTSSharedTTCpScale=230 \
              option.MCTSMinimumKLDGainPerNode=0.00003 \
              option.MCTSPolicySoftmaxTemp=1.359 \
              "option.Move Overhead=200" \
            -each tc=10+0.1 restart=on \
            -games 2 -rounds "${GAMES}" -repeat \
            -concurrency "${CONCURRENCY}" \
            -maxmoves 200 \
            -srand 6147500 \
            -resign movecount=3 score=700 twosided=true \
            -draw movenumber=40 movecount=8 score=8 \
            ${SPRT_ARGS} \
            ${BOOK_ARGS} \
            -pgnout results/hybrid_blitz/games.pgn \
            -recover \
            -ratinginterval 10 \
            2>&1 | tee results/hybrid_blitz/output.log
          CUTECHESS_EXIT=$?
          set -e

          echo "exit_code=${CUTECHESS_EXIT}" >> "$GITHUB_OUTPUT"
          cat results/hybrid_blitz/output.log

      - name: Tournament - Hybrid mode (rapid 60+0.6)
        id: hybrid_rapid
        if: success()
        env:
          GAMES: ${{ github.event.inputs.games_per_tc || '50' }}
          SPRT_MODE: ${{ github.event.inputs.sprt_mode || 'true' }}
          ELO0: ${{ github.event.inputs.sprt_elo0 || '-10' }}
          ELO1: ${{ github.event.inputs.sprt_elo1 || '5' }}
          THREADS: ${{ github.event.inputs.threads_per_engine || '1' }}
          HASH: ${{ github.event.inputs.hash_mb || '128' }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '1' }}
        run: |
          CUTECHESS="$(pwd)/candidate/reference/cutechess/build/cutechess-cli"
          BASELINE="$(pwd)/baseline/build/metalfish"
          CANDIDATE="$(pwd)/candidate/build/metalfish"
          WEIGHTS="$(pwd)/candidate/networks/BT4-1024x15x32h-swa-6147500.pb"
          BOOK="$(pwd)/candidate/reference/books/8moves_v3.pgn"
          mkdir -p results/hybrid_rapid

          SPRT_ARGS=""
          if [ "$SPRT_MODE" = "true" ]; then
            SPRT_ARGS="-sprt elo0=${ELO0} elo1=${ELO1} alpha=0.05 beta=0.05"
          fi

          BOOK_ARGS=""
          if [ -f "$BOOK" ]; then
            BOOK_ARGS="-openings file=$BOOK format=pgn order=random plies=16"
          fi

          set +e
          "$CUTECHESS" \
            -engine cmd="$CANDIDATE" name=Candidate proto=uci dir="$(pwd)/candidate" \
              "option.Threads=${THREADS}" "option.Hash=${HASH}" \
              option.UseHybridSearch=true option.UseMCTS=false \
              "option.NNWeights=${WEIGHTS}" \
              option.MCTSAddDirichletNoise=false \
              option.MCTSParityPreset=false \
              option.TransformerLowTimeFallbackMs=1500 \
              option.TransformerMinMoveBudgetMs=400 \
              option.HybridABRootRejectMCTS=true \
              option.HybridMCTSRootReject=true \
              option.HybridMCTSABRootHints=true \
              option.HybridMCTSABRootHintCount=8 \
              option.HybridMCTSABRootHintDelayMs=0 \
              option.HybridABCandidateVerifyMs=240 \
              option.HybridABCandidateVerifyCount=5 \
              option.HybridRootPawnLeverTieBreak=true \
              option.HybridMCTSUseSharedTT=false \
              option.HybridMCTSSharedTTCpScale=230 \
              option.MCTSMinimumKLDGainPerNode=0.00003 \
              option.MCTSPolicySoftmaxTemp=1.359 \
              "option.Move Overhead=200" \
            -engine cmd="$BASELINE" name=Baseline proto=uci dir="$(pwd)/baseline" \
              "option.Threads=${THREADS}" "option.Hash=${HASH}" \
              option.UseHybridSearch=true option.UseMCTS=false \
              "option.NNWeights=${WEIGHTS}" \
              option.MCTSAddDirichletNoise=false \
              option.MCTSParityPreset=false \
              option.TransformerLowTimeFallbackMs=1500 \
              option.TransformerMinMoveBudgetMs=400 \
              option.HybridABRootRejectMCTS=true \
              option.HybridMCTSRootReject=true \
              option.HybridMCTSABRootHints=true \
              option.HybridMCTSABRootHintCount=8 \
              option.HybridMCTSABRootHintDelayMs=0 \
              option.HybridABCandidateVerifyMs=240 \
              option.HybridABCandidateVerifyCount=5 \
              option.HybridRootPawnLeverTieBreak=true \
              option.HybridMCTSUseSharedTT=false \
              option.HybridMCTSSharedTTCpScale=230 \
              option.MCTSMinimumKLDGainPerNode=0.00003 \
              option.MCTSPolicySoftmaxTemp=1.359 \
              "option.Move Overhead=200" \
            -each tc=60+0.6 restart=on \
            -games 2 -rounds "${GAMES}" -repeat \
            -concurrency "${CONCURRENCY}" \
            -maxmoves 200 \
            -srand 6147500 \
            -resign movecount=3 score=700 twosided=true \
            -draw movenumber=40 movecount=8 score=8 \
            ${SPRT_ARGS} \
            ${BOOK_ARGS} \
            -pgnout results/hybrid_rapid/games.pgn \
            -recover \
            -ratinginterval 10 \
            2>&1 | tee results/hybrid_rapid/output.log
          CUTECHESS_EXIT=$?
          set -e

          echo "exit_code=${CUTECHESS_EXIT}" >> "$GITHUB_OUTPUT"
          cat results/hybrid_rapid/output.log

      # -----------------------------------------------------------------------
      # Tournament: AB-only mode (CPU only, no GPU dependency)
      # -----------------------------------------------------------------------
      - name: Tournament - AB-only mode (blitz 10+0.1)
        id: ab_blitz
        if: success() && (github.event.inputs.test_ab_only != 'false')
        env:
          GAMES: ${{ github.event.inputs.games_per_tc || '50' }}
          SPRT_MODE: ${{ github.event.inputs.sprt_mode || 'true' }}
          ELO0: ${{ github.event.inputs.sprt_elo0 || '-10' }}
          ELO1: ${{ github.event.inputs.sprt_elo1 || '5' }}
          THREADS: ${{ github.event.inputs.threads_per_engine || '1' }}
          HASH: ${{ github.event.inputs.hash_mb || '128' }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '1' }}
        run: |
          CUTECHESS="$(pwd)/candidate/reference/cutechess/build/cutechess-cli"
          BASELINE="$(pwd)/baseline/build/metalfish"
          CANDIDATE="$(pwd)/candidate/build/metalfish"
          BOOK="$(pwd)/candidate/reference/books/8moves_v3.pgn"
          mkdir -p results/ab_blitz

          SPRT_ARGS=""
          if [ "$SPRT_MODE" = "true" ]; then
            SPRT_ARGS="-sprt elo0=${ELO0} elo1=${ELO1} alpha=0.05 beta=0.05"
          fi

          BOOK_ARGS=""
          if [ -f "$BOOK" ]; then
            BOOK_ARGS="-openings file=$BOOK format=pgn order=random plies=16"
          fi

          set +e
          "$CUTECHESS" \
            -engine cmd="$CANDIDATE" name=Candidate-AB proto=uci dir="$(pwd)/candidate" \
              "option.Threads=${THREADS}" "option.Hash=${HASH}" \
              option.UseHybridSearch=false option.UseMCTS=false \
            -engine cmd="$BASELINE" name=Baseline-AB proto=uci dir="$(pwd)/baseline" \
              "option.Threads=${THREADS}" "option.Hash=${HASH}" \
              option.UseHybridSearch=false option.UseMCTS=false \
            -each tc=10+0.1 restart=on \
            -games 2 -rounds "${GAMES}" -repeat \
            -concurrency "${CONCURRENCY}" \
            -maxmoves 200 \
            -srand 6147501 \
            -resign movecount=3 score=700 twosided=true \
            -draw movenumber=40 movecount=8 score=8 \
            ${SPRT_ARGS} \
            ${BOOK_ARGS} \
            -pgnout results/ab_blitz/games.pgn \
            -recover \
            -ratinginterval 10 \
            2>&1 | tee results/ab_blitz/output.log
          CUTECHESS_EXIT=$?
          set -e

          echo "exit_code=${CUTECHESS_EXIT}" >> "$GITHUB_OUTPUT"
          cat results/ab_blitz/output.log

      # -----------------------------------------------------------------------
      # Parse results and apply pass/fail criteria
      # -----------------------------------------------------------------------
      - name: Evaluate tournament results
        id: evaluate
        if: always()
        run: |
          python3 - << 'PYTHON_SCRIPT'
          import re
          import sys
          import os
          import math
          import json
          from pathlib import Path

          def parse_cutechess_output(log_path: str) -> dict:
              """Parse cutechess-cli output for score line and SPRT result."""
              result = {
                  "wins": 0, "losses": 0, "draws": 0,
                  "score_pct": 50.0,
                  "elo": 0.0, "elo_error": 0.0,
                  "sprt_status": "none",  # none, H1, H0, or inconclusive
                  "llr": 0.0,
                  "total_games": 0,
                  "raw_output": "",
              }
              if not Path(log_path).exists():
                  result["sprt_status"] = "skipped"
                  return result

              text = Path(log_path).read_text()
              result["raw_output"] = text

              # Parse score line: "Score of Candidate vs Baseline: W - L - D  [pct%] N"
              score_re = re.compile(
                  r"Score of .+? vs .+?: (\d+) - (\d+) - (\d+)\s+\[([0-9.]+)\]\s+(\d+)"
              )
              for line in text.splitlines():
                  m = score_re.search(line)
                  if m:
                      result["wins"] = int(m.group(1))
                      result["losses"] = int(m.group(2))
                      result["draws"] = int(m.group(3))
                      result["score_pct"] = float(m.group(4)) * 100
                      result["total_games"] = int(m.group(5))

              # Parse SPRT result
              if "SPRT: llr" in text:
                  llr_match = re.search(r"SPRT: llr ([0-9.e+-]+)", text)
                  if llr_match:
                      result["llr"] = float(llr_match.group(1))
                  if "H1 accepted" in text or "Test passed" in text:
                      result["sprt_status"] = "H1"
                  elif "H0 accepted" in text or "Test failed" in text:
                      result["sprt_status"] = "H0"
                  else:
                      result["sprt_status"] = "inconclusive"

              # Compute Elo from score
              n = result["wins"] + result["losses"] + result["draws"]
              if n > 0:
                  score = (result["wins"] + result["draws"] / 2.0) / n
                  if 0 < score < 1:
                      result["elo"] = -400.0 * math.log10(1.0 / score - 1.0)
                      # Elo error margin (approximate)
                      var = (result["wins"] * (1 - score)**2 +
                             result["draws"] * (0.5 - score)**2 +
                             result["losses"] * score**2) / n
                      se = math.sqrt(var / n) if var > 0 else 0
                      if se > 0 and 0.001 < score - 1.96*se < 0.999:
                          elo_lo = -400 * math.log10(1.0 / (score - 1.96*se) - 1.0)
                          elo_hi = -400 * math.log10(1.0 / min(0.999, score + 1.96*se) - 1.0)
                          result["elo_error"] = (elo_hi - elo_lo) / 2.0

              return result

          def check_regression(result: dict, label: str, max_elo_loss: float = -20.0) -> bool:
              """
              Return True if the result passes (no regression detected).

              Pass criteria (any of):
              1. SPRT H1 accepted (candidate is not weaker)
              2. SPRT H0 NOT accepted AND score >= 45% (inconclusive but not losing)
              3. No SPRT, score >= 45% and Elo >= max_elo_loss

              Fail criteria (any of):
              1. SPRT H0 accepted (candidate is weaker -- regression confirmed)
              2. Score < 40% (catastrophic regression, regardless of SPRT)
              3. Elo estimate below max_elo_loss with 95% CI entirely negative
              """
              w, l, d = result["wins"], result["losses"], result["draws"]
              n = result["total_games"]
              elo = result["elo"]
              sprt = result["sprt_status"]
              score_pct = result["score_pct"]

              print(f"\n{'='*60}")
              print(f"  {label}")
              print(f"{'='*60}")
              print(f"  Games: {n}  (W:{w} D:{d} L:{l})")
              print(f"  Score: {score_pct:.1f}%  |  Elo: {elo:+.1f} +/- {result['elo_error']:.1f}")
              print(f"  SPRT:  {sprt}  (LLR: {result['llr']:.3f})")

              if sprt == "skipped":
                  print(f"  RESULT: SKIPPED (no log file)")
                  return True

              if n == 0:
                  print(f"  RESULT: SKIPPED (no games played)")
                  return True

              # Catastrophic regression: score below 40% is always a fail
              if n >= 10 and score_pct < 40.0:
                  print(f"  RESULT: FAIL -- catastrophic regression (score {score_pct:.1f}% < 40%)")
                  return False

              # SPRT H0 accepted: regression confirmed statistically
              if sprt == "H0":
                  print(f"  RESULT: FAIL -- SPRT rejected candidate (H0 accepted, Elo {elo:+.1f})")
                  return False

              # SPRT H1 accepted: candidate is not weaker
              if sprt == "H1":
                  print(f"  RESULT: PASS -- SPRT accepted candidate (H1, Elo {elo:+.1f})")
                  return True

              # No SPRT conclusion (inconclusive or fixed-count mode)
              # Use score threshold: must not be losing badly
              if elo < max_elo_loss and (elo + result["elo_error"]) < 0:
                  print(f"  RESULT: FAIL -- Elo {elo:+.1f} below threshold {max_elo_loss} "
                        f"(95% CI entirely negative)")
                  return False

              if score_pct >= 45.0:
                  print(f"  RESULT: PASS -- score {score_pct:.1f}% >= 45% (no significant regression)")
                  return True

              # Borderline: warn but pass if insufficient games
              if n < 20:
                  print(f"  RESULT: PASS (insufficient games for conclusion, n={n})")
                  return True

              print(f"  RESULT: FAIL -- score {score_pct:.1f}% < 45% over {n} games")
              return False

          # Parse all tournament results
          results_dir = Path("results")
          tournaments = {
              "Hybrid Blitz (10+0.1)": "hybrid_blitz/output.log",
              "Hybrid Rapid (60+0.6)": "hybrid_rapid/output.log",
              "AB-only Blitz (10+0.1)": "ab_blitz/output.log",
          }

          all_pass = True
          summary = {}
          for label, log_file in tournaments.items():
              log_path = results_dir / log_file
              result = parse_cutechess_output(str(log_path))
              passed = check_regression(result, label, max_elo_loss=-20.0)
              summary[label] = {
                  "passed": passed,
                  "games": result["total_games"],
                  "score_pct": result["score_pct"],
                  "elo": round(result["elo"], 1),
                  "elo_error": round(result["elo_error"], 1),
                  "sprt": result["sprt_status"],
                  "wdl": f"{result['wins']}/{result['draws']}/{result['losses']}",
              }
              if not passed:
                  all_pass = False

          # Write summary JSON for artifact
          summary_path = results_dir / "tournament_summary.json"
          summary_path.parent.mkdir(parents=True, exist_ok=True)
          with open(summary_path, "w") as f:
              json.dump(summary, f, indent=2)

          # Print final verdict
          print(f"\n{'='*60}")
          print(f"  TOURNAMENT SUMMARY")
          print(f"{'='*60}")
          for label, s in summary.items():
              status = "PASS" if s["passed"] else "FAIL"
              print(f"  [{status}] {label}: {s['elo']:+.1f} Elo "
                    f"({s['wdl']}, {s['games']} games, SPRT={s['sprt']})")
          print(f"{'='*60}")

          if all_pass:
              print("\n  VERDICT: ALL TOURNAMENTS PASSED -- no regression detected.")
              sys.exit(0)
          else:
              print("\n  VERDICT: REGRESSION DETECTED -- PR candidate is weaker than main.")
              sys.exit(1)
          PYTHON_SCRIPT

      # -----------------------------------------------------------------------
      # Upload artifacts
      # -----------------------------------------------------------------------
      - name: Upload tournament results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: engine-tournament-results
          path: |
            results/
          if-no-files-found: warn
