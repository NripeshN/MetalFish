name: MetalFish CI

on:
  push:
    branches: [main, dev]
    tags:
      - "v*"
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: metalfish-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  METALFISH_BT4_WEIGHTS_URL: https://storage.lczero.org/files/networks-contrib/big-transformers/BT4-1024x15x32h-swa-6147500.pb.gz

jobs:
  build-and-test:
    name: Build & Test (macOS Metal)
    runs-on: macos-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sw_vers
          sysctl -n hw.ncpu
          sysctl -n hw.memsize
          system_profiler SPDisplaysDataType | grep -A 8 "Metal" || true
          brew install protobuf zlib abseil
          python3 -m pip install --upgrade pip
          python3 -m pip install -r tests/requirements.txt

      - name: Download engine networks
        run: python3 tools/download_engine_networks.py

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DUSE_METAL=ON \
            -DBUILD_TESTS=ON

      - name: Build
        run: |
          cmake --build build --target metalfish metalfish_tests test_nn_comparison metalfish_nn_probe \
            -j"$(sysctl -n hw.ncpu)"

      - name: Run C++ tests
        run: ./build/metalfish_tests

      - name: Run Python tests
        run: |
          python3 tests/testing.py --quick
          python3 tests/test_lichess_bot.py
          python3 tests/test_lichess_puzzle_runner.py
          python3 tests/test_hybrid_regression_compare.py
          python3 tests/test_benchmark_configs.py
          python3 tests/test_nn_backend_artifacts.py

      - name: Run ANE option/config smoke
        run: |
          mkdir -p build/ci-ane/t1-512-heads-b8.mlmodelc
          : > build/ci-ane/t1-512x15x8h-distilled-swa-3395000.pb.gz
          python3 tools/lichess_bot.py \
            --config-check \
            --hybrid-ane-root-probe \
            --hybrid-ane-weights build/ci-ane/t1-512x15x8h-distilled-swa-3395000.pb.gz \
            --hybrid-ane-model-path build/ci-ane/t1-512-heads-b8.mlmodelc \
            --hybrid-ane-compute-units cpu-ne \
            --hybrid-ane-root-hint-count 10 \
            --hybrid-ane-root-hint-wait-ms 250 \
            --hybrid-ane-min-budget-ms 1000

      - name: Run Apple accelerator tool tests
        run: |
          python3 -m py_compile \
            tools/compare_puzzle_runs.py \
            tools/filter_lichess_puzzle_csv.py \
            tools/apple_coreml_microbench.py \
            tools/check_nn_backend_artifacts.py \
            tools/compare_nn_backend_outputs.py \
            tools/lc0_coreml_bk_policy_probe.py \
            tools/lc0_coreml_concurrency_benchmark.py \
            tools/lc0_coreml_position_parity.py \
            tools/lc0_coreml_root_value_probe.py \
            tools/lc0_coreml_value_export.py \
            tools/lc0_mlx_value_benchmark.py
          python3 tests/test_apple_coreml_microbench.py
          python3 tests/test_lc0_coreml_bk_policy_probe.py
          python3 tests/test_lc0_coreml_concurrency_benchmark.py
          python3 tests/test_lc0_coreml_position_parity.py
          python3 tests/test_lc0_coreml_root_value_probe.py
          python3 tests/test_lc0_coreml_value_export.py
          python3 tests/test_lc0_mlx_value_benchmark.py

      - name: Run Metal NN parity report
        run: |
          METALFISH_NN_WEIGHTS=networks/BT4-1024x15x32h-swa-6147500.pb \
          METALFISH_NN_PARITY_REPORT=build/metal-nn-parity-report.md \
          METALFISH_NN_BATCH_BENCH=1 \
          METALFISH_NN_BENCH_ITERS=2 \
          METALFISH_NN_BENCH_MAX_BATCH=16 \
          ./build/test_nn_comparison 2>&1 | tee build/metal-nn-comparison.log
          ./build/metalfish_nn_probe \
            --weights networks/BT4-1024x15x32h-swa-6147500.pb \
            --backend metal \
            --top 3 \
            --warmup 0 \
            --iterations 1 \
            --full-policy \
            2>&1 | tee build/metal-nn-probe.log
          python3 tools/check_nn_backend_artifacts.py \
            --backend-label "Metal (MPSGraph) backend" \
            --parity-report build/metal-nn-parity-report.md \
            --comparison-log build/metal-nn-comparison.log \
            --probe-log build/metal-nn-probe.log \
            --manifest-out build/metal-nn-artifact-manifest.json \
            --min-policy-top 3 \
            --require-batch-benchmark

      - name: Run UCI smoke
        run: |
          python3 tools/uci_smoke.py \
            --engine build/metalfish \
            --timeout 120 \
            --setoption UseHybridSearch=true \
            --setoption NNWeights=networks/BT4-1024x15x32h-swa-6147500.pb \
            --go "depth 4"

      - name: Run Hybrid clock safety smoke
        run: |
          python3 tools/uci_smoke.py \
            --engine build/metalfish \
            --timeout 90 \
            --setoption UseMCTS=false \
            --setoption UseHybridSearch=true \
            --setoption NNWeights=networks/BT4-1024x15x32h-swa-6147500.pb \
            --setoption Threads=8 \
            --setoption Move\ Overhead=500 \
            --setoption TransformerLowTimeFallbackMs=3000 \
            --setoption TransformerMinMoveBudgetMs=400 \
            --setoption MCTSAddDirichletNoise=false \
            --go "wtime 1000 btime 1000 winc 3000 binc 3000" \
            --expect-output "Starting Parallel Hybrid Search" \
            --reject-output "Time safety:"
          python3 tools/uci_smoke.py \
            --engine build/metalfish \
            --setoption UseMCTS=false \
            --setoption UseHybridSearch=true \
            --setoption Threads=8 \
            --setoption Move\ Overhead=500 \
            --setoption TransformerLowTimeFallbackMs=3000 \
            --setoption TransformerMinMoveBudgetMs=400 \
            --go "wtime 800 btime 800 winc 3000 binc 3000" \
            --expect-output "Time safety: estimated move budget" \
            --reject-output "Starting Parallel Hybrid Search"

      - name: Run MCTS low-node tactical smoke
        run: |
          python3 tools/uci_smoke.py \
            --engine build/metalfish \
            --timeout 90 \
            --setoption UseHybridSearch=false \
            --setoption UseMCTS=true \
            --setoption NNWeights=networks/BT4-1024x15x32h-swa-6147500.pb \
            --setoption Threads=8 \
            --setoption MCTSMaxThreads=1 \
            --setoption MCTSParallelSearch=true \
            --setoption MCTSMinibatchSize=0 \
            --setoption MCTSAddDirichletNoise=false \
            --setoption TransformerLowTimeFallbackMs=0 \
            --go "movetime 1000" \
            --expect-output "Starting Multi-Threaded MCTS Search" \
            --reject-output "Time safety:" \
            --reject-output "Falling back to Alpha-Beta"
          python3 tools/uci_smoke.py \
            --engine build/metalfish \
            --timeout 90 \
            --setoption UseHybridSearch=false \
            --setoption UseMCTS=true \
            --setoption NNWeights=networks/BT4-1024x15x32h-swa-6147500.pb \
            --setoption Threads=8 \
            --setoption MCTSMaxThreads=1 \
            --setoption MCTSParallelSearch=false \
            --setoption MCTSMinibatchSize=0 \
            --setoption MCTSAddDirichletNoise=false \
            --position "fen 1nk1r1r1/pp2n1pp/4p3/q2pPp1N/b1pP1P2/B1P2R2/2P1B1PP/R2Q2K1 w - -" \
            --go "nodes 50" \
            --expect-bestmove h5f6

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: metalfish-macos-arm64
          path: |
            build/metalfish
            build/metal-nn-comparison.log
            build/metal-nn-parity-report.md
            build/metal-nn-probe.log
            build/metal-nn-artifact-manifest.json
            README.md
            CHANGELOG.md
            LICENSE
          if-no-files-found: error

  release:
    name: Create macOS ARM64 Release
    needs: [build-and-test]
    runs-on: macos-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install protobuf zlib abseil

      - name: Download engine networks
        run: python3 tools/download_engine_networks.py

      - name: Build release binary
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_METAL=ON \
            -DBUILD_TESTS=OFF
          cmake --build build --target metalfish -j"$(sysctl -n hw.ncpu)"

      - name: Package release
        run: |
          mkdir -p release
          cp build/metalfish release/
          cp README.md CHANGELOG.md LICENSE release/
          tar -czvf metalfish-${{ github.ref_name }}-macos-arm64.tar.gz \
            -C release .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: metalfish-${{ github.ref_name }}-macos-arm64.tar.gz
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
