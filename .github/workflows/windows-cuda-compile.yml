name: Windows CUDA Compile Gate

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/windows-cuda-compile.yml"
      - "tools/run_windows_cuda_compile_gate.ps1"
      - "tools/uci_smoke.py"
      - "CMakeLists.txt"
      - "src/mcts/backend_adapter.*"
      - "src/mcts/evaluator.*"
      - "src/nn/cuda/**"
      - "src/nn/encoder.*"
      - "src/nn/input_plane_packing.h"
      - "src/nn/input_planes.h"
      - "src/nn/loader.*"
      - "src/nn/network*.cpp"
      - "src/nn/network*.h"
      - "src/nn/policy_map.*"
      - "src/nn/proto/net.proto"
      - "src/nn/tables/**"
      - "src/nn/weights.*"
      - "src/nn/weights_file.h"
      - "tests/test_main.cpp"
      - "tests/test_mcts_module.cpp"
      - "tests/test_nn_comparison.cpp"
  workflow_dispatch:
    inputs:
      cuda_version:
        description: CUDA Toolkit version to install
        required: false
        default: "12.9.1"
      cuda_archs:
        description: CMAKE_CUDA_ARCHITECTURES value
        required: false
        default: "89"
      build_tests:
        description: Compile CUDA-backed test/probe targets
        required: false
        default: true
        type: boolean

concurrency:
  group: metalfish-windows-cuda-compile-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  BUILD_TYPE: Release

jobs:
  windows-cuda-compile:
    name: Windows CUDA Compile
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Validate gate script syntax
        shell: pwsh
        run: |
          $tokens = $null
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path tools/run_windows_cuda_compile_gate.ps1),
            [ref]$tokens,
            [ref]$parseErrors
          ) | Out-Null
          if ($parseErrors.Count -ne 0) {
            $parseErrors | Format-List | Out-String | Write-Error
            exit 1
          }

      - name: Install CUDA Toolkit
        id: cuda-toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ inputs.cuda_version || '12.9.1' }}
          method: network
          sub-packages: '["nvcc","cudart","cublas","cublas_dev","visual_studio_integration"]'

      - name: Install dependencies
        shell: pwsh
        run: |
          cmake --version
          ninja --version
          nvcc --version
          cl
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            $env:VCPKG_INSTALLATION_ROOT = "C:\vcpkg"
          }
          vcpkg install protobuf zlib abseil --triplet x64-windows
          python -m pip install -r tests/requirements.txt

      - name: Compile CUDA backend
        shell: pwsh
        env:
          METALFISH_CUDA_ARCHS: ${{ inputs.cuda_archs || '89' }}
        run: |
          $buildTests = if ("${{ inputs.build_tests }}" -eq "false") { "OFF" } else { "ON" }
          tools/run_windows_cuda_compile_gate.ps1 `
            -BuildDir build-windows-cuda `
            -BuildType "${env:BUILD_TYPE}" `
            -CudaArchs "${env:METALFISH_CUDA_ARCHS}" `
            -BuildTests $buildTests

      - name: Upload compile artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: windows-cuda-compile-${{ github.run_id }}
          path: |
            build-windows-cuda/CMakeCache.txt
            build-windows-cuda/compile_commands.json
            build-windows-cuda/windows-cuda-compile-summary.md
            build-windows-cuda/**/*.log
          if-no-files-found: warn
