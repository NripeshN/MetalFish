name: CUDA GPU Gate

on:
  workflow_dispatch:
    inputs:
      zones:
        description: Space-separated GCP zones to try for the L4 VM
        required: false
        default: ""
      machine:
        description: GCP machine type
        required: false
        default: "g2-standard-8"
      cuda_archs:
        description: CMAKE_CUDA_ARCHITECTURES value
        required: false
        default: "89"
      uci_go:
        description: UCI go command for CUDA smokes
        required: false
        default: "nodes 8"
      stable_batch_size:
        description: CUDA stable execution batch size
        required: false
        default: "16"
      cublas_workspace_config:
        description: Optional CUBLAS_WORKSPACE_CONFIG diagnostic override
        required: false
        default: ""
      profile:
        description: Run the optional CUDA profile smoke
        required: false
        default: false
        type: boolean
      gcs_prefix:
        description: Optional gs:// prefix for gate artifacts
        required: false
        default: ""
      metal_ci_run_id:
        description: MetalFish CI run ID whose macOS artifact supplies the Metal probe suite
        required: false
        default: ""
      require_metal_compare:
        description: Fail unless Metal probe artifacts are supplied and compared
        required: false
        default: true
        type: boolean

concurrency:
  group: metalfish-cuda-gpu-gate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  id-token: write

env:
  METALFISH_BT4_WEIGHTS_URL: https://storage.lczero.org/files/networks-contrib/big-transformers/BT4-1024x15x32h-swa-6147500.pb.gz
  METALFISH_LEGACY_WEIGHTS_URL: https://storage.lczero.org/files/networks/00af53b081e80147172e6f281c01daf5ca19ada173321438914c730370aa4267

jobs:
  cuda-gpu-gate:
    name: CUDA L4 Runtime Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Metal comparison inputs
        run: |
          set -euo pipefail
          if [ "${{ inputs.require_metal_compare }}" = "true" ] && \
             [ -z "${{ inputs.metal_ci_run_id }}" ]; then
            echo "metal_ci_run_id is required when require_metal_compare=true" >&2
            exit 2
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Download Metal probe suite artifact
        if: ${{ inputs.metal_ci_run_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p metal-artifacts
          gh run download "${{ inputs.metal_ci_run_id }}" \
            --name metalfish-macos-arm64 \
            --dir metal-artifacts
          test -s metal-artifacts/build/metal-nn-probe-suite.log
          test -s metal-artifacts/build/metal-legacy-nn-probe-suite.log

      - name: Run CUDA GPU gate
        env:
          METALFISH_GCP_PROJECT: ${{ vars.METALFISH_GCP_PROJECT }}
          METALFISH_GCP_ZONES: ${{ inputs.zones }}
          METALFISH_GCP_MACHINE: ${{ inputs.machine }}
          METALFISH_GCP_INSTANCE: metalfish-cuda-gh-${{ github.run_id }}-${{ github.run_attempt }}
          METALFISH_GCP_ARTIFACT_DIR: ${{ github.workspace }}/results/cuda_gpu_gate
          METALFISH_GCP_GCS_PREFIX: ${{ inputs.gcs_prefix }}
          METALFISH_GCP_COLLECT_ARTIFACTS: "1"
          METALFISH_CUDA_ARCHS: ${{ inputs.cuda_archs }}
          METALFISH_CUDA_UCI_GO: ${{ inputs.uci_go }}
          METALFISH_CUDA_STABLE_EXECUTION_BATCH_SIZE: ${{ inputs.stable_batch_size }}
          METALFISH_REQUIRE_METAL_COMPARE: ${{ inputs.require_metal_compare }}
          CUBLAS_WORKSPACE_CONFIG: ${{ inputs.cublas_workspace_config }}
        run: |
          set -euo pipefail
          : "${METALFISH_GCP_PROJECT:=metalfish}"
          if [ "${{ inputs.profile }}" = "true" ]; then
            export METALFISH_CUDA_PROFILE=1
          else
            export METALFISH_CUDA_PROFILE=0
          fi
          if [ -s "${GITHUB_WORKSPACE}/metal-artifacts/build/metal-nn-probe-suite.log" ]; then
            export METALFISH_METAL_PROBE_SUITE_LOG="${GITHUB_WORKSPACE}/metal-artifacts/build/metal-nn-probe-suite.log"
          fi
          if [ -s "${GITHUB_WORKSPACE}/metal-artifacts/build/metal-legacy-nn-probe-suite.log" ]; then
            export METALFISH_METAL_LEGACY_PROBE_SUITE_LOG="${GITHUB_WORKSPACE}/metal-artifacts/build/metal-legacy-nn-probe-suite.log"
          fi
          tools/run_gcp_cuda_gpu_gate.sh

      - name: Upload CUDA gate artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cuda-gpu-gate-${{ github.run_id }}
          path: results/cuda_gpu_gate/
          if-no-files-found: warn
