name: Windows CUDA Runtime Gate

on:
  workflow_dispatch:
    inputs:
      windows_cuda_run_id:
        description: Windows CUDA Compile workflow run ID whose artifact supplies the package
        required: true
      zones:
        description: Space-separated GCP zones to try for the Windows L4 VM
        required: false
        default: ""
      machine:
        description: Space-separated GCP machine types to try for the Windows L4 VM
        required: false
        default: "g2-standard-8 g2-standard-4"
      uci_go:
        description: UCI go command for the packaged CUDA MCTS smoke
        required: false
        default: "nodes 1"
      gcs_prefix:
        description: Optional gs:// prefix for gate artifacts
        required: false
        default: ""
      metal_ci_run_id:
        description: MetalFish CI run ID whose macOS artifact supplies Metal probe suites
        required: false
        default: ""
      require_metal_compare:
        description: Fail unless Metal probe artifacts are supplied and compared
        required: false
        default: true
        type: boolean

concurrency:
  group: metalfish-windows-cuda-runtime-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  id-token: write

env:
  METALFISH_BT4_WEIGHTS_URL: https://storage.lczero.org/files/networks-contrib/big-transformers/BT4-1024x15x32h-swa-6147500.pb.gz

jobs:
  windows-cuda-runtime:
    name: Windows L4 CUDA Runtime Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Windows CUDA package provenance
        env:
          GH_TOKEN: ${{ github.token }}
          METALFISH_EXPECTED_SHA: ${{ github.sha }}
          METALFISH_WINDOWS_CUDA_RUN_ID: ${{ inputs.windows_cuda_run_id }}
        run: |
          set -euo pipefail
          run_json="$(gh run view "${METALFISH_WINDOWS_CUDA_RUN_ID}" \
            --json conclusion,headSha,status,url,workflowName)"
          workflow_name="$(printf '%s' "${run_json}" | jq -r '.workflowName')"
          status="$(printf '%s' "${run_json}" | jq -r '.status')"
          conclusion="$(printf '%s' "${run_json}" | jq -r '.conclusion')"
          head_sha="$(printf '%s' "${run_json}" | jq -r '.headSha')"
          url="$(printf '%s' "${run_json}" | jq -r '.url')"
          if [ "${workflow_name}" != "Windows CUDA Compile Gate" ]; then
            echo "windows_cuda_run_id must refer to Windows CUDA Compile Gate, got '${workflow_name}' (${url})" >&2
            exit 2
          fi
          if [ "${status}" != "completed" ] || [ "${conclusion}" != "success" ]; then
            echo "windows_cuda_run_id must be a completed successful run, got status=${status} conclusion=${conclusion} (${url})" >&2
            exit 2
          fi
          if [ "${head_sha}" != "${METALFISH_EXPECTED_SHA}" ]; then
            echo "windows_cuda_run_id is for ${head_sha}, expected ${METALFISH_EXPECTED_SHA} (${url})" >&2
            exit 2
          fi

      - name: Validate Metal comparison inputs
        run: |
          set -euo pipefail
          if [ "${{ inputs.require_metal_compare }}" = "true" ] && \
             [ -z "${{ inputs.metal_ci_run_id }}" ]; then
            echo "metal_ci_run_id is required when require_metal_compare=true" >&2
            exit 2
          fi

      - name: Validate Metal artifact provenance
        if: ${{ inputs.metal_ci_run_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          METALFISH_EXPECTED_SHA: ${{ github.sha }}
          METALFISH_METAL_CI_RUN_ID: ${{ inputs.metal_ci_run_id }}
        run: |
          set -euo pipefail
          run_json="$(gh run view "${METALFISH_METAL_CI_RUN_ID}" \
            --json conclusion,headSha,status,url,workflowName)"
          workflow_name="$(printf '%s' "${run_json}" | jq -r '.workflowName')"
          status="$(printf '%s' "${run_json}" | jq -r '.status')"
          conclusion="$(printf '%s' "${run_json}" | jq -r '.conclusion')"
          head_sha="$(printf '%s' "${run_json}" | jq -r '.headSha')"
          url="$(printf '%s' "${run_json}" | jq -r '.url')"
          if [ "${workflow_name}" != "MetalFish CI" ]; then
            echo "metal_ci_run_id must refer to MetalFish CI, got '${workflow_name}' (${url})" >&2
            exit 2
          fi
          if [ "${status}" != "completed" ] || [ "${conclusion}" != "success" ]; then
            echo "metal_ci_run_id must be a completed successful run, got status=${status} conclusion=${conclusion} (${url})" >&2
            exit 2
          fi
          if [ "${head_sha}" != "${METALFISH_EXPECTED_SHA}" ]; then
            echo "metal_ci_run_id is for ${head_sha}, expected ${METALFISH_EXPECTED_SHA} (${url})" >&2
            exit 2
          fi

      - name: Download Windows CUDA package artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p windows-cuda-artifact
          gh run download "${{ inputs.windows_cuda_run_id }}" \
            --pattern "windows-cuda-compile-*" \
            --dir windows-cuda-artifact
          package="$(find windows-cuda-artifact -name 'metalfish*windows-x86_64-msvc-cuda.zip' -print -quit)"
          if [ -z "${package}" ]; then
            echo "Windows CUDA package zip not found in artifact" >&2
            find windows-cuda-artifact -maxdepth 4 -type f -print >&2
            exit 2
          fi
          echo "METALFISH_WINDOWS_CUDA_PACKAGE=${package}" >> "$GITHUB_ENV"

      - name: Download Metal probe suite artifact
        if: ${{ inputs.metal_ci_run_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p metal-artifacts
          gh run download "${{ inputs.metal_ci_run_id }}" \
            --name metalfish-macos-arm64 \
            --dir metal-artifacts
          test -s metal-artifacts/build/metal-nn-probe-suite.log
          test -s metal-artifacts/build/metal-legacy-nn-probe-suite.log

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download engine networks
        run: |
          python3 tools/download_engine_networks.py --nnue-only
          python3 tools/download_engine_networks.py --bt4-only
          python3 tools/download_engine_networks.py --legacy-only

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Windows CUDA runtime gate
        env:
          METALFISH_GCP_PROJECT: ${{ vars.METALFISH_GCP_PROJECT }}
          METALFISH_GCP_ZONES: ${{ inputs.zones }}
          METALFISH_GCP_MACHINES: ${{ inputs.machine }}
          METALFISH_GCP_INSTANCE: metalfish-win-cuda-gh-${{ github.run_id }}-${{ github.run_attempt }}
          METALFISH_GCP_ARTIFACT_DIR: ${{ github.workspace }}/results/windows_cuda_runtime_gate
          METALFISH_GCP_GCS_PREFIX: ${{ inputs.gcs_prefix }}
          METALFISH_GCP_COLLECT_ARTIFACTS: "1"
          METALFISH_WINDOWS_CUDA_UCI_GO: ${{ inputs.uci_go }}
          METALFISH_WINDOWS_CUDA_COMPILE_RUN_ID: ${{ inputs.windows_cuda_run_id }}
          METALFISH_REQUIRE_METAL_COMPARE: ${{ inputs.require_metal_compare }}
        run: |
          set -euo pipefail
          : "${METALFISH_GCP_PROJECT:=metalfish}"
          if [ -s "${GITHUB_WORKSPACE}/metal-artifacts/build/metal-nn-probe-suite.log" ]; then
            export METALFISH_METAL_PROBE_SUITE_LOG="${GITHUB_WORKSPACE}/metal-artifacts/build/metal-nn-probe-suite.log"
          fi
          if [ -s "${GITHUB_WORKSPACE}/metal-artifacts/build/metal-legacy-nn-probe-suite.log" ]; then
            export METALFISH_METAL_LEGACY_PROBE_SUITE_LOG="${GITHUB_WORKSPACE}/metal-artifacts/build/metal-legacy-nn-probe-suite.log"
          fi
          tools/run_gcp_windows_cuda_runtime_gate.sh

      - name: Upload Windows CUDA runtime artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: windows-cuda-runtime-${{ github.run_id }}
          path: results/windows_cuda_runtime_gate/
          if-no-files-found: warn
