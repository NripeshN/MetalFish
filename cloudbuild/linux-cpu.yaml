steps:
  - name: ubuntu:24.04
    id: linux-cpu-build-test
    entrypoint: bash
    args:
      - -lc
      - |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y \
          build-essential \
          cmake \
          curl \
          ninja-build \
          pkg-config \
          protobuf-compiler \
          libprotobuf-dev \
          zlib1g-dev \
          libabsl-dev \
          python3 \
          python3-pip
        python3 -m pip install -r tests/requirements.txt || \
          python3 -m pip install --break-system-packages -r tests/requirements.txt
        python3 tools/download_engine_networks.py --nnue-only
        cmake -S . -B build-linux -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DUSE_METAL=OFF \
          -DBUILD_TESTS=ON \
          -DMETALFISH_ENABLE_IPO=OFF
        cmake --build build-linux --target metalfish metalfish_tests
        ./build-linux/metalfish_tests
        python3 -m py_compile \
          tests/paper_benchmarks.py \
          tests/test_benchmark_configs.py \
          tools/run_tournament_live.py \
          tools/lichess_puzzle_runner.py \
          tools/download_engine_networks.py \
          tools/uci_smoke.py
        python3 tests/test_benchmark_configs.py
        python3 tools/uci_smoke.py --engine build-linux/metalfish --go "depth 3"

timeout: 3600s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
